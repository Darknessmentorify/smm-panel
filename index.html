<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DARK SMM PANEL PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: Orbitron;
    background: radial-gradient(circle at top,#020617,#000);
    color:#00f0ff;
}

/* HEADER */
header {
    text-align:center;
    padding:20px;
    border-bottom:1px solid #00f0ff55;
    box-shadow:0 0 20px #00f0ff33;
}

h1 {
    text-shadow:0 0 20px #00f0ff;
}

/* LOGIN */
#loginBox {
    text-align:center;
    margin-top:50px;
}

input {
    padding:10px;
    margin:5px;
    background:black;
    border:1px solid #00f0ff55;
    color:#00f0ff;
    border-radius:8px;
}

/* BOTONES */
button {
    padding:10px 15px;
    border:none;
    background:linear-gradient(90deg,#00f0ff,#0088ff);
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px #00f0ff;
}

/* PANEL */
#panel {
    display:none;
}

/* TOP BAR */
.top {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding:10px;
}

/* GRID */
#servicios {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card {
    background:#020617;
    border:1px solid #00f0ff33;
    padding:15px;
    border-radius:12px;
    transition:.3s;
}

.card:hover {
    transform:translateY(-5px);
    box-shadow:0 0 20px #00f0ff55;
}

.msg {
    text-align:center;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>🎮 DARK SMM PANEL PRO</h1>
</header>

<!-- LOGIN -->
<div id="loginBox">
<h2>Login / Registro</h2>
<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel">

<div class="top">
<h3>💰 Saldo: $<span id="saldo">0</span></h3>
<button onclick="cargar()">⚡ Cargar Servicios</button>
<input id="buscador" placeholder="🔍 Buscar..." oninput="filtrar()">
<select id="categoria" onchange="filtrar()">
<option value="">Todas</option>
</select>
</div>

<div class="msg" id="estado"></div>
<div id="servicios"></div>

</div>

<script>
let user = null;
let serviciosGlobal = [];

/* REGISTER */
async function register(){
  await fetch("/api/register",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: pass.value
    })
  });

  alert("Registrado 🔥");
}

/* LOGIN */
async function login(){
  const res = await fetch("/api/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: pass.value
    })
  });

  const data = await res.json();

  if(data.error){
    return alert(data.error);
  }

  user = data;

  saldo.innerText = data.saldo;

  loginBox.style.display="none";
  panel.style.display="block";
}

/* CARGAR SERVICIOS */
async function cargar(){
    estado.innerText = "🔥 Cargando servicios...";

    try {
        const res = await fetch("/api/services");
        const data = await res.json();

        serviciosGlobal = data;

        let cats = [...new Set(data.map(s=>s.category))];
        categoria.innerHTML = '<option value="">Todas</option>';
        cats.forEach(c=>{
            categoria.innerHTML += `<option>${c}</option>`;
        });

        render(data);
        estado.innerText = "✅ Servicios cargados";

    } catch(e) {
        estado.innerText = "❌ Error cargando servicios";
    }
}

/* RENDER */
function render(data){
    servicios.innerHTML="";

    data.forEach(s=>{
        let precio = parseFloat(s.rate).toFixed(2);

        servicios.innerHTML += `
        <div class="card">
            <h3>${s.name}</h3>
            <p>💰 $${precio}</p>
            <p>📊 Min: ${s.min} | Max: ${s.max}</p>

            <input placeholder="Link" id="l-${s.service}">
            <input placeholder="Cantidad" id="q-${s.service}">

            <button onclick="comprar(${s.service}, ${precio})">Comprar</button>
        </div>
        `;
    });
}

/* FILTRO */
function filtrar(){
    let texto = buscador.value.toLowerCase();
    let cat = categoria.value;

    let filtrados = serviciosGlobal.filter(s=>{
        return s.name.toLowerCase().includes(texto) &&
               (cat==="" || s.category===cat);
    });

    render(filtrados);
}

/* COMPRAR */
async function comprar(id, precio){
    let link = document.getElementById("l-"+id).value;
    let qty = document.getElementById("q-"+id).value;

    if(!link || !qty) return alert("Completa datos");

    estado.innerText = "⏳ Procesando...";

    const total = precio * qty;

    try {
        const res = await fetch("/api/order",{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify({
                email: user.email,
                service:id,
                link,
                quantity:qty,
                price: total
            })
        });

        const data = await res.json();

        if(data.error){
            return estado.innerText = "❌ " + data.error;
        }

        saldo.innerText = data.saldo;

        estado.innerText = "✅ Orden creada 🔥";

    } catch(e){
        estado.innerText = "❌ Error";
    }
}
</script>

</body>
</html>
