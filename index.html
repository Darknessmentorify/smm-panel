<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK SMM PANEL PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000814;
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
    color:#00f0ff;
    text-shadow:0 0 20px #00f0ff;
}

input{
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
    width:220px;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    color:black;
    font-weight:bold;
}

#panel{
    display:none;
}

.card{
    background:#001d3d;
    padding:20px;
    margin:20px;
    border-radius:15px;
}
</style>
</head>

<body>

<h1>🎮 DARK SMM PANEL PRO</h1>

<div id="loginBox">
    <h2>Login / Registro</h2>
    <input id="email" placeholder="Correo"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>

    <button onclick="register()">Registrarse</button>
    <button onclick="login()">Entrar</button>
</div>

<div id="panel">
    <h2>🔥 Bienvenido</h2>
    <p id="userEmail"></p>

    <div class="card">
        ✔ Login funcionando correctamente
    </div>

    <button onclick="logout()">Cerrar sesión</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// 🔥 CONFIG CORRECTA (LA TUYA)
const firebaseConfig = {
  apiKey: "AIzaSyBi4VDFWk3z5qRmBypf4IF-ax27ops9en0",
  authDomain: "dark-smm-22f11.firebaseapp.com",
  projectId: "dark-smm-22f11",
  storageBucket: "dark-smm-22f11.appspot.com",
  messagingSenderId: "1023226798495",
  appId: "1:1023226798495:web:0de746c9614f9eaed8ddaa"
};


// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


// REGISTER
window.register = async () => {
  try{
    await createUserWithEmailAndPassword(auth, email.value, pass.value);
    alert("Registrado");
  }catch(e){
    alert(e.message);
  }
};


// LOGIN
window.login = async () => {
  try{
    await signInWithEmailAndPassword(auth, email.value, pass.value);
  }catch(e){
    alert(e.message);
  }
};


// SESSION
onAuthStateChanged(auth, (user)=>{
  if(user){
    loginBox.style.display="none";
    panel.style.display="block";
    userEmail.innerText=user.email;
  }else{
    loginBox.style.display="block";
    panel.style.display="none";
  }
});


// LOGOUT
window.logout = ()=> signOut(auth);

</script>

</body>
</html>
