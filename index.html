<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK SMM PANEL PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000814;
    color:white;
    text-align:center;
}

/* HEADER */
h1{
    margin-top:30px;
    color:#00f0ff;
    text-shadow:0 0 20px #00f0ff;
}

/* LOGIN */
#loginBox{
    margin-top:50px;
}

input{
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
    width:200px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #00f0ff;
}

/* PANEL */
#panel{
    display:none;
    margin-top:40px;
}

.card{
    background:#001d3d;
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px #00f0ff33;
}
</style>
</head>

<body>

<h1>🎮 DARK SMM PANEL PRO</h1>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login / Registro</h2>
    <input id="email" placeholder="Correo"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>

    <button onclick="register()">Registrarse</button>
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel">
    <h2>🔥 Bienvenido</h2>
    <p id="userEmail"></p>

    <div class="card">
        💰 Saldo: <span id="saldo">100</span>$
    </div>

    <button onclick="logout()">Cerrar sesión</button>
</div>

<script type="module">

// 🔥 IMPORTS FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 CONFIG TUYA
const firebaseConfig = {
  apiKey: "AIzaSyBi4VDFWk3z5qRmBypf4IF-ax27ops9en0",
  authDomain: "dark-smm-22f11.firebaseapp.com",
  projectId: "dark-smm-22f11",
  storageBucket: "dark-smm-22f11.firebasestorage.app",
  messagingSenderId: "1023226798495",
  appId: "1:1023226798495:web:40c9529f90e12babd8ddaa",
  measurementId: "G-VN94FNGEV6"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 REGISTER
window.register = async () => {
  try {
    const user = await createUserWithEmailAndPassword(auth, email.value, pass.value);

    await setDoc(doc(db, "users", user.user.uid), {
      email: email.value,
      saldo: 100
    });

    alert("Registrado 🔥");

  } catch (e) {
    alert(e.message);
  }
};

// 🔥 LOGIN
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, pass.value);
  } catch (e) {
    alert(e.message);
  }
};

// 🔥 DETECTAR LOGIN
onAuthStateChanged(auth, async (user) => {
  if (user) {
    loginBox.style.display = "none";
    panel.style.display = "block";

    userEmail.innerText = user.email;

    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists()) {
      saldo.innerText = snap.data().saldo;
    }

  } else {
    loginBox.style.display = "block";
    panel.style.display = "none";
  }
});

// 🔥 LOGOUT
window.logout = () => {
  signOut(auth);
};

</script>

</body>
</html>
