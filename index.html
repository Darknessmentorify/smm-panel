<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DARK SMM PANEL PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: Orbitron;
    background: radial-gradient(circle at top,#020617,#000);
    color:#00f0ff;
}

/* HEADER */
header {
    text-align:center;
    padding:20px;
    border-bottom:1px solid #00f0ff55;
    box-shadow:0 0 20px #00f0ff33;
}

h1 {
    text-shadow:0 0 20px #00f0ff;
}

/* CONTROLES */
.top {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding:10px;
}

input, select {
    padding:10px;
    background:black;
    border:1px solid #00f0ff55;
    color:#00f0ff;
    border-radius:8px;
}

/* BOTONES */
button {
    padding:10px 15px;
    border:none;
    background:linear-gradient(90deg,#00f0ff,#0088ff);
    color:white;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px #00f0ff;
}

/* GRID */
#servicios {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card {
    background:#020617;
    border:1px solid #00f0ff33;
    padding:15px;
    border-radius:12px;
    transition:.3s;
}

.card:hover {
    transform:translateY(-5px);
    box-shadow:0 0 20px #00f0ff55;
}

/* LOADER */
.loader {
    text-align:center;
    margin-top:30px;
    display:none;
}
</style>
</head>

<body>

<header>
<h1>🎮 DARK SMM PANEL PRO</h1>
</header>

<div class="top">
<button onclick="cargar()">⚡ Cargar Servicios</button>
<input id="buscador" placeholder="🔍 Buscar..." oninput="filtrar()">
<select id="categoria" onchange="filtrar()">
<option value="">Todas</option>
</select>
</div>

<div class="loader" id="loader">🔥 Cargando...</div>

<div id="servicios"></div>

<script>
const API_KEY = "TU_API_KEY_AQUI";
const API_URL = "https://api.allorigins.win/raw?url=https://socialmentorify.com/api/v2";

let serviciosGlobal = [];

/* 🔥 CARGAR SERVICIOS */
async function cargar(){
    loader.style.display="block";

    const res = await fetch(API_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            key:API_KEY,
            action:"services"
        })
    });

    const data = await res.json();
    loader.style.display="none";

    serviciosGlobal = data;

    // llenar categorías
    let cats = [...new Set(data.map(s=>s.category))];
    categoria.innerHTML = '<option value="">Todas</option>';
    cats.forEach(c=>{
        categoria.innerHTML += `<option>${c}</option>`;
    });

    render(data);
}

/* 🎮 RENDER */
function render(data){
    servicios.innerHTML="";

    data.forEach(s=>{
        let precio = (parseFloat(s.rate)*2).toFixed(2);

        servicios.innerHTML += `
        <div class="card">
            <h3>${s.name}</h3>
            <p>💰 $${precio}</p>
            <p>📊 Min: ${s.min} | Max: ${s.max}</p>

            <input placeholder="Link" id="l-${s.service}">
            <input placeholder="Cantidad" id="q-${s.service}">

            <button onclick="comprar(${s.service})">Comprar</button>
        </div>
        `;
    });
}

/* 🔍 FILTRO */
function filtrar(){
    let texto = buscador.value.toLowerCase();
    let cat = categoria.value;

    let filtrados = serviciosGlobal.filter(s=>{
        return s.name.toLowerCase().includes(texto) &&
               (cat==="" || s.category===cat);
    });

    render(filtrados);
}

/* 💰 COMPRAR */
async function comprar(id){
    let link = document.getElementById("l-"+id).value;
    let qty = document.getElementById("q-"+id).value;

    if(!link || !qty) return alert("Completa datos");

    const res = await fetch(API_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            key:API_KEY,
            action:"add",
            service:id,
            link,
            quantity:qty
        })
    });

    const data = await res.json();
    alert("Orden: "+ (data.order || "Error"));
}
</script>

</body>
</html>
