<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK SMM PANEL PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000814;
    color:white;
    text-align:center;
}

h1{
    margin-top:30px;
    color:#00f0ff;
    text-shadow:0 0 20px #00f0ff;
}

input{
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
    width:220px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 15px #00f0ff;
}

#panel{
    display:none;
}

.card{
    background:#001d3d;
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px #00f0ff33;
}
</style>
</head>

<body>

<h1>🎮 DARK SMM PANEL PRO</h1>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login / Registro</h2>
    <input id="email" placeholder="Correo"><br>
    <input id="pass" type="password" placeholder="Contraseña"><br>

    <button onclick="register()">Registrarse</button>
    <button onclick="login()">Entrar</button>
</div>

<!-- PANEL -->
<div id="panel">

    <h2>🔥 Bienvenido</h2>
    <p id="userEmail"></p>

    <div class="card">
        💰 Saldo API: <span id="saldoApi">...</span> $
    </div>

    <div class="card">
        <h3>📦 Servicios</h3>
        <select id="services" style="width:250px;"></select>
    </div>

    <div class="card">
        <h3>🚀 Crear Orden</h3>
        <input id="link" placeholder="Link"><br>
        <input id="qty" type="number" placeholder="Cantidad"><br>
        <button onclick="crearOrden()">Enviar Orden</button>
        <p id="orderResult"></p>
    </div>

    <button onclick="logout()">Cerrar sesión</button>

</div>

<script type="module">

// 🔥 FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// ⚠️ PON TU CONFIG AQUÍ
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID",
};

// INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 API KEY
const API_KEY = "38b17bc9e1673d2f007c100187416b3ef9982b686014794dedecf94a5e98fa57";
const API_URL = "https://socialmentorify.com/api/v2";


// 🧠 REGISTER
window.register = async () => {
  try {
    const user = await createUserWithEmailAndPassword(auth, email.value, pass.value);

    await setDoc(doc(db, "users", user.user.uid), {
      email: email.value
    });

    alert("Registrado 🔥");

  } catch (e) {
    alert(e.message);
  }
};


// 🔐 LOGIN
window.login = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, pass.value);
  } catch (e) {
    alert(e.message);
  }
};


// 👀 DETECTAR SESIÓN
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    panel.style.display = "block";
    userEmail.innerText = user.email;

    cargarSaldo();
    cargarServicios();

  } else {
    loginBox.style.display = "block";
    panel.style.display = "none";
  }
});


// 💰 SALDO
async function cargarSaldo(){
  const res = await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      key: API_KEY,
      action: "balance"
    })
  });

  const data = await res.json();
  saldoApi.innerText = data.balance;
}


// 📦 SERVICIOS
async function cargarServicios(){
  const res = await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      key: API_KEY,
      action: "services"
    })
  });

  const data = await res.json();

  services.innerHTML = "";

  data.slice(0,50).forEach(s=>{
    let op = document.createElement("option");
    op.value = s.service;
    op.text = `${s.name} - $${s.rate}`;
    services.appendChild(op);
  });
}


// 🚀 CREAR ORDEN
window.crearOrden = async () => {

  const res = await fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      key: API_KEY,
      action: "add",
      service: services.value,
      link: link.value,
      quantity: qty.value
    })
  });

  const data = await res.json();

  orderResult.innerText = "Orden ID: " + data.order;

};


// 🚪 LOGOUT
window.logout = () => {
  signOut(auth);
};

</script>

</body>
</html>
